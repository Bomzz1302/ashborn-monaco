<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
	<style type="text/css">
		@font-face {
		    font-family: 'JetBrains Mono';
		    src: url('./Fonts/JetBrainsMono-Regular.woff2') format('woff2'),
		         url('./Fonts/JetBrainsMono-Regular.ttf') format('truetype');
		    font-weight: normal;
		    font-style: normal;
		}

		:root { --url: url(""); }

		html, body {
			background-color: #141414;
			width: 100%;
			height: 100%;
			margin: 0;
			padding: 0;
			overflow: hidden;
			font-family: 'JetBrains Mono', Consolas, 'Courier New', monospace;
			color: white;
			display: flex;
			flex-direction: column;
		}

		.margin:first-child {
			background-image: var(--url);
			background-size: cover;
			background-repeat: no-repeat;
			background-attachment: fixed;
		}

		.lines-content:nth-of-type(1),
		.monaco-editor-background:nth-of-type(1) {
			background-image: var(--url);
			background-size: cover;
			background-repeat: no-repeat;
			background-attachment: fixed;
		}

		/* TAB BAR */
		#tab-bar {
			background: transparent;
			height: 36px;
			min-height: 36px;
			display: flex;
			align-items: center;
			padding: 0 6px 0 0;
			gap: 3px;
			border-bottom: 1px solid #2a2a2a;
			overflow-x: auto;
			overflow-y: hidden;
			white-space: nowrap;
		}

		#tab-bar::-webkit-scrollbar { height: 4px; }
		#tab-bar::-webkit-scrollbar-track { background: #1a1a1a; }
		#tab-bar::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

		.tab {
			height: 28px;
			display: flex;
			align-items: center;
			padding: 0 8px 0 12px;
			color: #666;
			cursor: pointer;
			background: #171717;
			border: 1px solid #2a2a2a;
			border-radius: 6px;
			margin-right: 2px;
			min-width: 80px;
			max-width: 160px;
			font-size: 13px;
			justify-content: space-between;
			user-select: none;
			font-family: 'JetBrains Mono', Consolas, monospace;
			transition: background 0.15s, color 0.15s;
		}

		.tab:first-child { margin-left: 8px; }

		.tab.active {
			background: #1f1f1f;
			color: #ccc;
			border-color: #3a3a3a;
			box-shadow: 0 2px 8px rgba(0,0,0,0.4);
		}

		.tab:hover { background: #222; color: #aaa; }

		.tab-name {
			overflow: hidden;
			text-overflow: ellipsis;
			white-space: nowrap;
			flex: 1;
		}

		.tab-close {
			opacity: 0;
			margin-left: 8px;
			width: 14px;
			height: 14px;
			display: flex;
			align-items: center;
			justify-content: center;
			border-radius: 50%;
			font-size: 14px;
			flex-shrink: 0;
			color: #888;
			transition: opacity 0.15s, color 0.15s;
			position: relative;
		}

		.tab:hover .tab-close { opacity: 1; }
		.tab-close:hover { color: #fff; }
		.tab-close::before {
			content: "×";
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			line-height: 0;
		}

		#new-tab-btn {
			background: transparent;
			border: none;
			color: #555;
			font-size: 20px;
			cursor: pointer;
			width: 24px;
			height: 24px;
			display: flex;
			align-items: center;
			justify-content: center;
			border-radius: 4px;
			margin-bottom: 2px;
			transition: color 0.15s;
			flex-shrink: 0;
		}
		#new-tab-btn:hover { color: #ccc; }

		/* EDITOR */
		#container {
			width: 100%;
			flex: 1;
			min-height: 0;
		}
	</style>
	<meta charset="utf-8" />
	<title></title>
</head>

<body>
	<div id="tab-bar">
		<div id="new-tab-btn">+</div>
	</div>
	<div id="container"></div>

	<script src="vs/loader.js"></script>
	<script type="text/javascript">
		require.config({ paths: { 'vs': 'vs' } });

		// API globals
		var GetText, SetText, SetTheme, SetScroll, ShowErr, Refresh;
		var SwitchMinimap, SwitchReadonly, SwitchRenderWhitespace, SwitchLinks;
		var SwitchLineHeight, SwitchFontSize, SwitchFolding, SwitchAutoIndent;
		var SwitchFontFamily, SwitchFontLigatures, AddIntellisense;
		var editor;
		var Proposals = [];

		// Tab system
		var tabs = [], activeTab = null, tabCount = 0, scriptCounter = 1;

		function Tab(content, name) {
			this.id = 'tab-' + Date.now() + Math.random();
			this.name = name || ('Script ' + scriptCounter++);
			this.content = content || '';
			this.model = monaco.editor.createModel(this.content, 'lua');
			this.element = createTabElement(this);
			tabCount++;
		}

		function createTabElement(tab) {
			var el = document.createElement('div');
			el.className = 'tab';
			el.innerHTML = '<span class="tab-name">' + tab.name + '</span><span class="tab-close"></span>';

			el.addEventListener('click', function(e) {
				if (!e.target.classList.contains('tab-close')) activateTab(tab);
			});

			el.querySelector('.tab-close').addEventListener('click', function(e) {
				e.stopPropagation();
				if (tabs.length > 1) closeTab(tab);
			});

			el.querySelector('.tab-name').addEventListener('dblclick', function() {
				startRename(tab, el);
			});

			return el;
		}

		function startRename(tab, el) {
			var nameEl = el.querySelector('.tab-name');
			if (nameEl.tagName === 'INPUT') return;
			var input = document.createElement('input');
			input.value = tab.name;
			input.style.cssText = 'width:80px;background:transparent;border:none;color:#ccc;outline:none;font-family:"JetBrains Mono",Consolas,monospace;font-size:13px;padding:0;';
			nameEl.replaceWith(input);
			input.focus();
			input.select();

			function finish() {
				tab.name = input.value.trim() || 'Untitled';
				var newEl = document.createElement('span');
				newEl.className = 'tab-name';
				newEl.textContent = tab.name;
				input.replaceWith(newEl);
				newEl.addEventListener('dblclick', function() { startRename(tab, el); });
			}

			input.addEventListener('blur', finish, { once: true });
			input.addEventListener('keydown', function(e) {
				if (e.key === 'Enter' || e.key === 'Escape') { input.blur(); }
			});
		}

		function activateTab(tab) {
			if (activeTab === tab) return;
			if (activeTab) activeTab.element.classList.remove('active');
			activeTab = tab;
			tab.element.classList.add('active');
			editor.setModel(tab.model);
			editor.focus();
		}

		function closeTab(tab) {
			var idx = tabs.indexOf(tab);
			if (idx === -1) return;
			tabs.splice(idx, 1);
			tab.element.remove();
			tab.model.dispose();
			tabCount--;
			if (tab === activeTab) {
				activeTab = null;
				activateTab(tabs[Math.max(0, idx - 1)]);
			}
		}

		function createNewTab() {
			var tab = new Tab();
			tabs.push(tab);
			var bar = document.getElementById('tab-bar');
			var btn = document.getElementById('new-tab-btn');
			bar.insertBefore(tab.element, btn);
			activateTab(tab);
			bar.scrollLeft = bar.scrollWidth;
		}

		require(['vs/editor/editor.main'], function () {
			function getDependencyProposals() {
				return Proposals.map(function(el) {
					var obj = {};
					for (var k in el) { if (k !== '__children__') obj[k] = el[k]; }
					return obj;
				});
			}
	
			monaco.editor.defineTheme('net-theme-light', {
				base: 'vs', inherit: true,
				rules: [
					{ token: 'global', foreground: '000000' },
					{ token: 'keyword', foreground: 'ff6a00' },
					{ token: 'comment', foreground: '666666' },
					{ token: 'number', foreground: 'ffc600' },
					{ token: 'string', foreground: 'ff8c3a' },
				]
			});

			monaco.editor.defineTheme('net-theme-dark', {
				base: 'vs-dark', inherit: true,
				rules: [
					{ token: 'global', foreground: 'FFFFFF', fontStyle: 'bold' },
					{ token: 'keyword', foreground: 'ff6a00', fontStyle: 'bold' },
					{ token: 'comment', foreground: '666666' },
					{ token: 'number', foreground: 'ffc600' },
					{ token: 'string', foreground: 'ff8c3a' },
				]
			});

			monaco.editor.defineTheme('PDark', {
				base: 'vs-dark', inherit: true,
				rules: [
					{ token: '', foreground: '#D4D4D4' },
					{ token: 'keyword', foreground: '#569CD6', fontStyle: 'bold' },
					{ token: 'keyword.local', foreground: '#569CD6', fontStyle: 'bold' },
					{ token: 'keyword.operator', foreground: '#569CD6' },
					{ token: 'keyword.function', foreground: '#C586C0', fontStyle: 'bold' },
					{ token: 'operator', foreground: '#D4D4D4' },
					{ token: 'entity.name.function', foreground: '#DCDCAA' },
					{ token: 'global', foreground: '#DCDCAA' },
					{ token: 'storage.type', foreground: '#C586C0' },
					{ token: 'comment', foreground: '#6A9955', fontStyle: 'italic' },
					{ token: 'delimiter.longstring', foreground: '#CE9178' },
					{ token: 'delimiter.bracket', foreground: '#FFD700' },
					{ token: 'delimiter.parenthesis', foreground: '#DA70D6' },
					{ token: 'delimiter.array', foreground: '#FFD700' },
					{ token: 'delimiter', foreground: '#D4D4D4' },
					{ token: 'string', foreground: '#CE9178' },
					{ token: 'string.escape', foreground: '#D7BA7D' },
					{ token: 'constant.language', foreground: '#569CD6' },
					{ token: 'number', foreground: '#B5CEA8' },
					{ token: 'support.function', foreground: '#DCDCAA' },
					{ token: 'support.function.library', foreground: '#4EC9B0' },
					{ token: 'support.type', foreground: '#4EC9B0' },
				],
				colors: {
					'editor.background': '#141414',
					'editorLineNumber.foreground': '#7A7A7A',
					'editorLineNumber.activeForeground': '#BBBBBB',
					'editorIndentGuide.background': '#1a1a1a',
					'editorSuggestWidget.background': '#181818',
					'editorSuggestWidget.border': '#1a1a1a',
					'editorSuggestWidget.foreground': '#D5D5D5',
					'editorSuggestWidget.selectedBackground': '#404040',
					'editorSuggestWidget.highlightForeground': '#18A0FB',
					'textCodeBlock.background': '#1B1B1B',
				}
			});

			require(['vs/basic-languages/monaco.contribution'], function () {
				monaco.languages.registerCompletionItemProvider('lua', {
					provideCompletionItems: function () {
						return { suggestions: getDependencyProposals() };
					},
					triggerCharacters: ['.', ':', '"'],
				});

				editor = monaco.editor.create(document.getElementById('container'), {
					model: null,
					language: 'lua',
					theme: 'PDark',
					fontSize: 16,
					fontFamily: "'JetBrains Mono', Consolas, 'Courier New', monospace",
					folding: true,
					dragAndDrop: true,
					links: true,
					minimap: { enabled: false },
					showFoldingControls: 'always',
					smoothScrolling: true,
					stopRenderingLineAfter: 6500,
					cursorBlinking: 'smooth',
					cursorSmoothCaretAnimation: true,
					foldingHighlight: false,
					fontLigatures: true,
					formatOnPaste: true,
					showDeprecated: true,
					scrollBeyondLastLine: false,
					suggest: { snippetsPreventQuickSuggestions: false },
					padding: { top: 6 }
				});

				// Buat tab pertama
				document.getElementById('new-tab-btn').addEventListener('click', createNewTab);
				createNewTab();

				window.parent.postMessage({ type: 'ready' }, '*');

				editor.onDidChangeModelContent(function() {
					window.parent.postMessage({ type: 'contentChanged', content: editor.getValue() }, '*');
				});

				try {
					if (CefSharp) {
						editor.onKeyDown(function(e) {
							if (!(e.altKey || e.ctrlKey || e.shiftKey || e.metaKey)) {
								if (e.key !== 'Backspace' || editor.getValue() !== '')
									CefSharp.PostMessage('keydown');
							}
						});
					}
				} catch(e) {}

			});

			window.onresize = function () { editor.layout(); };

			// API
			GetText = function () { return String(editor.getValue()); };
			SetText = function (x) {
				try { editor.setValue(JSON.parse(String(x))); }
				catch(e) { editor.setValue(String(x)); }
			};

			window.addEventListener('message', function(e) {
				if (e.data?.type === 'setText') editor.setValue(e.data.content ?? '');
				if (e.data?.type === 'setOption') {
					var o = e.data.option, v = e.data.value;
					if (o === 'minimap') SwitchMinimap(v.enabled);
					if (o === 'smoothScrolling') SwitchSmoothScrolling(v);
					if (o === 'cursorSmoothCaretAnimation') SwitchSmoothCaretAnimation(v);
					if (o === 'folding') SwitchFolding(v);
					if (o === 'fontLigatures') SwitchFontLigatures(v);
					if (o === 'wordWrap') SwitchWordWrap(v);
				}
			});

			SetTheme = function(n) {
				if (n === 'PDark') monaco.editor.setTheme('PDark');
				if (n === 'Dark') monaco.editor.setTheme('net-theme-dark');
				if (n === 'Light') monaco.editor.setTheme('net-theme-light');
			};
			SwitchMinimap = function(f) { editor.updateOptions({ minimap: { enabled: f } }); };
			SwitchReadonly = function(f) { editor.updateOptions({ readOnly: f }); };
			SwitchRenderWhitespace = function(o) { editor.updateOptions({ renderWhitespace: o }); };
			SwitchLinks = function(f) { editor.updateOptions({ links: f }); };
			SwitchLineHeight = function(n) { editor.updateOptions({ lineHeight: n }); };
			SwitchFontSize = function(n) { editor.updateOptions({ fontSize: n }); };
			SwitchFolding = function(f) { editor.updateOptions({ folding: f }); };
			SwitchAutoIndent = function(f) { editor.updateOptions({ autoIndent: f }); };
			SwitchWordWrap = function(f) { editor.updateOptions({ wordWrap: f }); };
			SwitchFontFamily = function(n) { editor.updateOptions({ fontFamily: n }); };
			SwitchFontLigatures = function(f) { editor.updateOptions({ fontLigatures: f }); };
			SwitchSmoothScrolling = function(f) { editor.updateOptions({ smoothScrolling: f }); };
			SwitchSmoothCaretAnimation = function(f) { editor.updateOptions({ cursorSmoothCaretAnimation: f }); };

			GetProposals = function() { return Proposals; };
			OnDidChangeContent = function(cb) {
				return editor.onDidChangeModelContent(function() { cb(editor.getValue()); });
			};
			OnDidChangeCursorPosition = function(cb) {
				return editor.onDidChangeCursorPosition(function(e) { cb(e.position); });
			};
			SetScroll = function(line) { editor.revealLineInCenter({ lineNumber: line }); };
			Cut = function() { editor.focus(); document.execCommand('cut'); };
			Copy = function() { editor.focus(); document.execCommand('copy'); };
			Paste = function() { editor.focus(); document.execCommand('paste'); };
			Undo = function() { editor.focus(); document.execCommand('undo'); };
			Redo = function() { editor.focus(); document.execCommand('redo'); };
			SelectAll = function() { editor.focus(); document.execCommand('selectAll'); };

			ShowErr = function(line, col, endline, endcol, msg) {
				editor.revealPositionInCenter({ lineNumber: line, column: col });
				editor.deltaDecorations([], [{
					range: new monaco.Range(line, col, endline, endcol),
					options: { inlineClassName: 'squiggly-error', hoverMessage: { value: msg } }
				}]);
			};

			AddSnippet = function(kindName, snippetName, data) {
				var snippet = {
					insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
					kind: monaco.languages.CompletionItemKind[kindName],
				};
				for (var k in data) {
					snippet[k] = (k === 'insertText' && typeof data[k] === 'object') ? data[k].join('\n') : data[k];
				}
				if (!snippet.label) snippet.label = snippetName;
				if (!snippet.insertText) snippet.insertText = snippetName;
				Proposals.push(snippet);
			};

			AddRawSnippet = function(data) { Proposals.push(data); };

			Refresh = function() {
				var text = GetText();
				SetText('');
				editor.trigger('keyboard', 'type', { text: text });
			};
		});
	</script>
</body>
</html>
